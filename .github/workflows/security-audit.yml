name: Security Audit

on:
  # Run on every push to main/develop
  push:
    branches: [main, develop]

  # Run on all pull requests
  pull_request:
    branches: [main, develop]

  # Run weekly on schedule
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"

  # Allow manual triggering
  workflow_dispatch:

# Grant write permissions so the "Comment on PR" step can post results
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  npm-audit:
    name: npm Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

          # Note: do NOT use cache: "yarn" here — corepack must be enabled first
          # to avoid yarn v1 vs v4 version mismatch errors in setup-node's cache detection


      - name: Install dependencies
        run: yarn install --immutable


      - name: Run yarn audit (production only)
        id: audit-prod
        run: |
          echo "## Production Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          yarn npm audit --all --severity moderate || echo "audit_prod_failed=true" >> $GITHUB_OUTPUT
          yarn npm audit --all --severity moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true
        continue-on-error: true

      - name: Run yarn audit (all dependencies)
        id: audit-all
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## All Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          yarn npm audit --severity moderate || echo "audit_all_failed=true" >> $GITHUB_OUTPUT
          yarn npm audit --severity moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true
        continue-on-error: true

      - name: Check critical vulnerabilities
        run: |
          # Check for critical or high vulnerabilities
          AUDIT_JSON=$(yarn npm audit --json 2>/dev/null || echo '{"advisories":{}}')
          CRITICAL_COUNT=$(echo "$AUDIT_JSON" | jq '[.advisories | to_entries[] | select(.value.severity == "critical")] | length' 2>/dev/null || echo "0")
          HIGH_COUNT=$(echo "$AUDIT_JSON" | jq '[.advisories | to_entries[] | select(.value.severity == "high")] | length' 2>/dev/null || echo "0")

          echo "Critical vulnerabilities: $CRITICAL_COUNT"
          echo "High vulnerabilities: $HIGH_COUNT"

          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Found $CRITICAL_COUNT critical and $HIGH_COUNT high vulnerabilities in dependencies"
            exit 1
          fi

      - name: Run yarn audit (all dependencies)
        id: audit-all
        run: |
          echo "## Dependency Security Audit" >> $GITHUB_STEP_SUMMARY
          # Run once, tee to both the step summary and stdout; || true so continue-on-error takes effect
          yarn npm audit --environment production --audit-level moderate 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: Generate JSON report
        if: always()
        run: |
          yarn npm audit --json > security-audit-report.json 2>&1 || true
          echo "{}" > security-audit-prod-only.json

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            security-audit-report.json
            security-audit-prod-only.json
          retention-days: 90

      - name: Check critical vulnerabilities
        run: |
          # Strict gate: yarn npm audit --audit-level critical exits non-zero when
          # any critical vulnerability is found. This is the production readiness gate:
          # a paid platform MUST NOT deploy with known critical security holes.
          echo "Running strict critical-vulnerability gate..."
          yarn npm audit --environment production --audit-level critical
          echo "✅ No critical vulnerabilities found — build is safe to deploy"


      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |

            const { execSync } = require('child_process');
            let vulnSummary = 'Audit results not available';
            let critical = 0, high = 0, moderate = 0, low = 0, total = 0;
            try {
              const output = execSync('yarn npm audit --json 2>/dev/null || echo "{}"', { encoding: 'utf8' });
              const auditReport = JSON.parse(output);
              const advisories = auditReport.advisories || {};
              for (const adv of Object.values(advisories)) {
                total++;
                if (adv.severity === 'critical') critical++;
                else if (adv.severity === 'high') high++;
                else if (adv.severity === 'moderate') moderate++;
                else low++;
              }
              vulnSummary = `Critical: ${critical}, High: ${high}, Moderate: ${moderate}, Low: ${low}`;
            } catch (e) {
              vulnSummary = 'Could not parse audit results';

            const fs = require('fs');
            let vulns = { total: 0, critical: 0, high: 0, moderate: 0, low: 0 };
            try {
              const auditReport = JSON.parse(fs.readFileSync('security-audit-report.json', 'utf8'));
              vulns = auditReport.metadata?.vulnerabilities ?? vulns;
            } catch (e) {
              console.log('Could not parse audit report:', e.message);

            }

            const comment = `## Security Audit Results

            **Total Vulnerabilities**: ${total}
            - ${vulnSummary}


            ${critical > 0 || high > 0 ? '⚠️ **Action Required**: Critical or high severity vulnerabilities found!' : '✅ No critical or high vulnerabilities'}

            ${vulns.critical > 0 ? '🚨 **Action Required**: Critical vulnerabilities found!' : vulns.high > 0 ? '⚠️ High severity vulnerabilities found — review recommended' : '✅ No critical or high vulnerabilities'}


            <details>
            <summary>View Full Report</summary>

            Download the full audit report from the workflow artifacts.
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on PRs; requires "Dependency graph" to be enabled in repo settings.
    # Marked continue-on-error so it never blocks the overall Security Summary.
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: true

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

          cache: "yarn"

          # Note: do NOT use cache: "yarn" — corepack must be enabled first


      - name: Install dependencies
        run: yarn install --immutable

      - name: Check licenses
        run: |
          npx license-checker --summary >> $GITHUB_STEP_SUMMARY
          npx license-checker --json > licenses.json
        continue-on-error: true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  security-summary:
    name: Security Summary
    needs: [npm-audit, dependency-review, license-check]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Create summary
        run: |
          echo "# Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- npm Audit: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Review: ${{ needs.dependency-review.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- License Check: ${{ needs.license-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.npm-audit.result }}" != "success" ]; then
            echo "⚠️ Security vulnerabilities detected. Review the npm audit job for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No security vulnerabilities detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if critical issues
        if: needs.npm-audit.result == 'failure'
        run: |
          echo "Security audit failed due to critical or high vulnerabilities"
          exit 1
