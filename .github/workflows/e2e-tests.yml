name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (3 Browsers)
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Note: do NOT use cache: "yarn" — corepack must be enabled first
          # to avoid yarn v1 vs v4 version mismatch errors in setup-node's cache detection

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build main app for E2E tests
        run: cd apps/main && yarn build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key-for-ci-build' }}
          NEXT_PUBLIC_DISABLE_AUTH: "true"
          NODE_OPTIONS: "--max-old-space-size=3072"

      - name: Start main app server
        run: |
          cd apps/main
          PORT=3000 npx next start -p 3000 &
          echo $! > /tmp/next-server.pid
          # Wait for server to be ready (up to 60 seconds)
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "✅ Server is ready"
              SERVER_READY=true
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done
          if [ "$SERVER_READY" = "false" ]; then
            echo "❌ Server failed to start within 60 seconds"
            exit 1
          fi
        env:
          NODE_ENV: production
          NEXT_PUBLIC_DISABLE_AUTH: "true"

      - name: Run E2E tests
        run: yarn test:e2e --project=${{ matrix.browser }}
        continue-on-error: true
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next-server.pid ]; then
            kill $(cat /tmp/next-server.pid) 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report-${{ matrix.browser }}
          path: test-results/html/
          retention-days: 7
          if-no-files-found: ignore

  visual-regression:
    name: Visual Regression Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Note: do NOT use cache: "yarn" — corepack must be enabled first

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build main app for visual tests
        run: cd apps/main && yarn build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key-for-ci-build' }}
          NEXT_PUBLIC_DISABLE_AUTH: "true"
          NODE_OPTIONS: "--max-old-space-size=3072"

      - name: Start main app server
        run: |
          cd apps/main
          PORT=3000 npx next start -p 3000 &
          echo $! > /tmp/next-server.pid
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "✅ Server is ready"
              SERVER_READY=true
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done
          if [ "$SERVER_READY" = "false" ]; then
            echo "❌ Server failed to start within 60 seconds"
            exit 1
          fi
        env:
          NODE_ENV: production
          NEXT_PUBLIC_DISABLE_AUTH: "true"

      - name: Run visual regression tests
        run: npx playwright test tests/e2e/visual --project=chromium
        continue-on-error: true
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next-server.pid ]; then
            kill $(cat /tmp/next-server.pid) 2>/dev/null || true
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: |
            test-results/**/diff-*.png
            test-results/**/actual-*.png
          retention-days: 7
          if-no-files-found: ignore

  access-control-tests:
    name: Access Control Scenarios
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Note: do NOT use cache: "yarn" — corepack must be enabled first

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build main app for access-control tests
        run: cd apps/main && yarn build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key-for-ci-build' }}
          NEXT_PUBLIC_DISABLE_AUTH: "true"
          NODE_OPTIONS: "--max-old-space-size=3072"

      - name: Start main app server
        run: |
          cd apps/main
          PORT=3000 npx next start -p 3000 &
          echo $! > /tmp/next-server.pid
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "✅ Server is ready"
              SERVER_READY=true
              break
            fi
            echo "Waiting for server... attempt $i/30"
            sleep 2
          done
          if [ "$SERVER_READY" = "false" ]; then
            echo "❌ Server failed to start within 60 seconds"
            exit 1
          fi
        env:
          NODE_ENV: production
          NEXT_PUBLIC_DISABLE_AUTH: "true"

      - name: Run access control tests
        run: npx playwright test tests/e2e/access-control --project=chromium
        continue-on-error: true
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next-server.pid ]; then
            kill $(cat /tmp/next-server.pid) 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: access-control-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  test-summary:
    name: Test Summary
    needs: [e2e-tests, visual-regression, access-control-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results
        continue-on-error: true

      - name: Create summary
        run: |
          echo "# E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E Tests (3 browsers)**: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Visual Regression**: ${{ needs.visual-regression.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Access Control**: ${{ needs.access-control-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.e2e-tests.result }}" == "success" ] && \
             [ "${{ needs.visual-regression.result }}" == "success" ] && \
             [ "${{ needs.access-control-tests.result }}" == "success" ]; then
            echo "✅ **All E2E tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some E2E tests did not pass — review artifacts for details.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> E2E tests run in informational mode; failures do not block the pipeline." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: E2E tests require a running app server. Results marked" >> $GITHUB_STEP_SUMMARY
          echo "\`skipped\` mean the build step did not complete (check build logs)." >> $GITHUB_STEP_SUMMARY
