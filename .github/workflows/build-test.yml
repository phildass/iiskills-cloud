name: Build & Test All Apps

# This workflow tests all active apps on every PR and push to main
# Required GitHub Secrets:
#   - NEXT_PUBLIC_SUPABASE_URL
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-all-apps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        app:
          - apps/main
          - apps/learn-ai
          - apps/learn-apt
          - apps/learn-chemistry
          - apps/learn-developer
          - apps/learn-geography
          - apps/learn-management
          - apps/learn-math
          - apps/learn-physics
          - apps/learn-pr
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Create CI environment stub
        run: |
          # Apps use .env.production symlinks → /etc/iiskills.env (set up by deploy script on server).
          # In CI that target doesn't exist, causing Next.js to throw ENOENT on stat().
          # Create a minimal stub so the symlinks resolve during the CI build.
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\nNEXT_PUBLIC_SUPABASE_ANON_KEY=%s\nNEXT_PUBLIC_DISABLE_AUTH=true\n' \
            "${NEXT_PUBLIC_SUPABASE_URL:-}" "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" > /tmp/iiskills-ci.env
          chmod 600 /tmp/iiskills-ci.env
          sudo cp /tmp/iiskills-ci.env /etc/iiskills.env
          rm -f /tmp/iiskills-ci.env
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build ${{ matrix.app }}
        run: |
          cd ${{ matrix.app }}
          yarn build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_DISABLE_AUTH: true

      - name: Check build output
        run: |
          if [ ! -d "${{ matrix.app }}/.next" ]; then
            echo "❌ Build failed - no .next directory"
            exit 1
          fi
          echo "✅ Build successful for ${{ matrix.app }}"

  merge-check:
    runs-on: ubuntu-latest
    needs: build-all-apps

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Validate content schema
        run: npm run validate-content

      - name: Check for orphans and broken links
        run: npm run check-orphans

      - name: All builds passed
        run: echo "✅ All 10 active apps built successfully - safe to merge!"
